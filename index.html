<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Láskyplné kupony pro mou princeznou 🌸</title>

<!-- Google Fonts: Playfair Display pro nadpisy, Montserrat pro text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ===== PROMĚNNÉ / BAREVNÁ PALETA ===== */
  :root {
    --bg-color: #fdf6f6;
    --accent: #ff8fa3;
    --accent-dark: #e26e85;
    --text-color: #4a4a4a;
    --card-bg: #ffffff;
    --used-gray: #b5b0b0;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 40px 20px 80px;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  /* ===== HLAVIČKA ===== */
  header {
    text-align: center;
    max-width: 700px;
    margin: 0 auto 50px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--accent-dark);
    margin-bottom: 14px;
    line-height: 1.2;
  }

  header p {
    font-size: 1.05rem;
    color: var(--text-color);
    opacity: 0.85;
    line-height: 1.6;
  }

  /* ===== MŘÍŽKA KUPONŮ ===== */
  .coupon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ===== KARTA KUPONU ===== */
  .coupon {
    position: relative;
    background: var(--card-bg);
    border-radius: 15px;
    border: 2px dashed var(--accent);
    padding: 32px 24px 26px;
    text-align: center;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    overflow: hidden;
  }

  /* Efekt "natrženého lístku" - vykousnuté půlkruhy vlevo a vpravo */
  .coupon::before,
  .coupon::after {
    content: "";
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    background: var(--bg-color);
    border-radius: 50%;
    z-index: 2;
  }

  .coupon::before {
    left: -14px;
  }

  .coupon::after {
    right: -14px;
  }

  /* Hover efekt jen na aktivních (nepoužitých) kuponech */
  .coupon:not(.used):hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 26px rgba(255, 143, 163, 0.35);
  }

  .coupon-icon {
    width: 68px;
    height: 68px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ffe1e6, #ffc7d2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  .coupon-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--accent-dark);
    margin-bottom: 10px;
  }

  .coupon-desc {
    font-size: 0.92rem;
    line-height: 1.55;
    margin-bottom: 22px;
    min-height: 66px;
  }

  .redeem-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .redeem-btn:hover {
    background: var(--accent-dark);
    transform: scale(1.04);
  }

  .redeem-btn:disabled {
    cursor: default;
    transform: none;
  }

  /* ===== VZHLED POUŽITÉHO KUPONU ===== */
  .coupon.used {
    filter: grayscale(1);
    opacity: 0.55;
  }

  .coupon.used .coupon-title,
  .coupon.used .coupon-desc {
    text-decoration: line-through;
  }

  .coupon.used .redeem-btn {
    background: var(--used-gray);
  }

  /* Malá poznámka pod mřížkou */
  footer {
    text-align: center;
    margin-top: 50px;
    font-size: 0.85rem;
    color: var(--text-color);
    opacity: 0.6;
  }

  @media (prefers-reduced-motion: reduce) {
    .coupon, .redeem-btn {
      transition: none;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Láskyplné kupony pro mou princeznou 🌸</h1>
  <p>Každý kupon níže je malý slib. Klikni na „Uplatnit kupon“, kdykoliv budeš chtít
     svůj dárek využít – tlačítko zůstane zapamatované, takže jednou uplatněný kupon
     už nezmizí a nebude se dát použít znovu. 💌</p>
</header>

<div class="coupon-grid" id="couponGrid">
  <!-- Kupony se generují dynamicky pomocí JavaScriptu -->
</div>

<footer>Vytvořeno s láskou, jen pro tebe.</footer>

<!-- Knihovna pro konfety (oslavná animace při uplatnění kuponu) -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
  // =====================================================================
  // KONFIGURACE: Sem si vlož svůj přístupový klíč z Web3Forms.com
  // (Zdarma se zaregistruješ na https://web3forms.com a klíč zkopíruješ.)
  // =====================================================================
  const WEB3FORMS_ACCESS_KEY = "SEM_VLOZ_SVOJ_KLIC";

  // Klíč, pod kterým se stav kuponů ukládá do LocalStorage prohlížeče
  const STORAGE_KEY = "laskyplne_kupony_stav";

  // =====================================================================
  // DATA KUPONŮ – uprav / přidávej kupony přímo tady
  // Každý kupon má unikátní "id", které se používá pro ukládání stavu
  // =====================================================================
  const coupons = [
    {
      id: "masaz",
      emoji: "💆‍♀️",
      title: "Božská masáž",
      desc: "30 minut profi masáže zad nebo nohou s vonným olejem a relaxační hudbou."
    },
    {
      id: "snidane",
      emoji: "🍳",
      title: "Snídaně do postele",
      desc: "Objednej si cokoliv od palačinek po vajíčka, donáška až pod peřinu s čerstvým čajem."
    },
    {
      id: "nadobi",
      emoji: "🧼",
      title: "Generální stopka nádobí",
      desc: "Dneska neumyješ ani lžičku. Beru to komplet na sebe, ty nohy nahoru!"
    },
    {
      id: "vylet",
      emoji: "🚗",
      title: "Útěk za dobrodružstvím",
      desc: "Sbal si věci, jedeme na tajný výlet. Cíl cesty, svačinu i program zařizuji já."
    },
    {
      id: "hadka",
      emoji: "🏳️",
      title: "Okamžité vítězství v hádce",
      desc: "Použij v případě nouze. Okamžitě uznávám tvou pravdu bez jakýchkoliv řečí."
    }
  ];

  // =====================================================================
  // POMOCNÉ FUNKCE PRO PRÁCI S LOCALSTORAGE
  // =====================================================================

  // Načte objekt se stavem uplatněných kuponů, např. { masaz: true }
  function loadUsedState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  // Uloží aktuální stav uplatněných kuponů zpět do LocalStorage
  function saveUsedState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let usedState = loadUsedState();

  // =====================================================================
  // VYKRESLENÍ KUPONŮ DO STRÁNKY
  // =====================================================================
  const grid = document.getElementById("couponGrid");

  function renderCoupons() {
    grid.innerHTML = "";

    coupons.forEach((coupon) => {
      const isUsed = !!usedState[coupon.id];

      const card = document.createElement("div");
      card.className = "coupon" + (isUsed ? " used" : "");
      card.dataset.id = coupon.id;

      card.innerHTML = `
        <div class="coupon-icon">${coupon.emoji}</div>
        <div class="coupon-title">${coupon.title}</div>
        <div class="coupon-desc">${coupon.desc}</div>
        <button class="redeem-btn" ${isUsed ? "disabled" : ""}>
          ${isUsed ? "Uplatněno" : "Uplatnit kupon"}
        </button>
      `;

      const btn = card.querySelector(".redeem-btn");
      if (!isUsed) {
        btn.addEventListener("click", () => redeemCoupon(coupon, card, btn));
      }

      grid.appendChild(card);
    });
  }

  // =====================================================================
  // ODESLÁNÍ E-MAILU PŘES WEB3FORMS PŘI UPLATNĚNÍ KUPONU
  // =====================================================================
  async function sendRedeemNotification(coupon) {
    const payload = {
      access_key: WEB3FORMS_ACCESS_KEY,
      subject: `Kupon uplatněn: ${coupon.title}`,
      message: `Tvoje přítelkyně právě uplatnila kupon "${coupon.title}" (${coupon.emoji}).`
    };

    const response = await fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload)
    });

    return response.ok;
  }

  // =====================================================================
  // OSLAVNÁ ANIMACE - DÉŠŤ KONFET PŘES CELOU OBRAZOVKU
  // =====================================================================
  function launchConfetti() {
    confetti({
      particleCount: 150,
      spread: 100,
      origin: { y: 0.6 },
      colors: ["#ff8fa3", "#ffc7d2", "#ffe1e6", "#e26e85", "#ffffff"]
    });
  }

  // =====================================================================
  // HLAVNÍ LOGIKA UPLATNĚNÍ KUPONU
  // =====================================================================
  async function redeemCoupon(coupon, card, btn) {
    // Zabráníme opakovanému kliknutí během odesílání
    btn.disabled = true;
    btn.textContent = "Odesílám...";

    try {
      await sendRedeemNotification(coupon);
    } catch (err) {
      // I když e-mail selže (např. klíč ještě není nastavený),
      // kupon se přesto označí jako uplatněný, aby zážitek nebyl narušen.
      console.warn("Odeslání e-mailu se nepodařilo:", err);
    }

    // Uložíme stav do LocalStorage, aby zůstal i po zavření prohlížeče
    usedState[coupon.id] = true;
    saveUsedState(usedState);

    // Vizuálně označíme kartu jako použitou
    card.classList.add("used");
    btn.textContent = "Uplatněno";

    // Odpálíme konfety na oslavu 🎉
    launchConfetti();
  }

  // Prvotní vykreslení stránky
  renderCoupons();
</script>

</body>
</html>
